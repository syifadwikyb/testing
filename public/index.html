<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator Raspi (HP)</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .status { font-weight: bold; color: red; margin-bottom: 20px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; width: 80%; }
        #btnStart { background-color: #28a745; color: white; }
        #btnStop { background-color: #dc3545; color: white; display: none; }
        textarea { width: 100%; font-size: 11px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🍓 Raspi Mock Device</h1>
        <p>Mengirim data MQTT seolah-olah ini Raspi</p>
        <p id="status" class="status">🔴 Disconnected</p>
        <button id="btnStart" onclick="startTracking()">MULAI SIMULASI</button>
        <button id="btnStop" onclick="stopTracking()">HENTIKAN</button>
        <textarea id="logs" rows="8"></textarea>
    </div>

    <script>
        // ================= KONFIGURASI WAJIB SAMA DENGAN RASPI =================
        const BUS_ID = 1;
        
        // 1. IP VPS Anda. Wajib pakai port WebSocket (8888)
        const BROKER_URL = 'ws://145.79.15.182:8888';
        
        // 2. Topik ini harus SAMA PERSIS dengan topik yang dipakai Raspi nanti
        const TOPIC = `diptrack/tracking/bus/${BUS_ID}/location`;
        // =======================================================================

        let client;
        let watchId;

        function log(msg) {
            const txt = document.getElementById('logs');
            txt.value = `[${new Date().toLocaleTimeString()}] ${msg}\n` + txt.value;
        }

        function startTracking() {
            log("Mengetuk pintu Broker WebSocket...");
            document.getElementById('btnStart').style.display = 'none';
            document.getElementById('btnStop').style.display = 'inline-block';

            client = mqtt.connect(BROKER_URL);

            client.on('connect', () => {
                document.getElementById('status').innerText = "🟢 TERHUBUNG KE BROKER";
                document.getElementById('status').style.color = "green";
                log("✅ Berhasil masuk! Menunggu GPS...");

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(sendPosition, (err) => log("❌ GPS Error: " + err.message), {
                        enableHighAccuracy: true, timeout: 5000, maximumAge: 0
                    });
                }
            });

            client.on('error', (err) => {
                log("❌ Gagal Konek: Pastikan backend Aedes jalan & Port 8888 terbuka di VPS.");
            });
        }

        function stopTracking() {
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(client) client.end();
            document.getElementById('btnStart').style.display = 'inline-block';
            document.getElementById('btnStop').style.display = 'none';
            document.getElementById('status').innerText = "🔴 Berhenti";
            document.getElementById('status').style.color = "red";
        }

        function sendPosition(position) {
            // 3. BENTUK PAYLOAD JSON INI HARUS SAMA PERSIS DENGAN KODE PYTHON/C++ DI RASPI NANTI
            const payload = {
                bus_id: BUS_ID,
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                speed: position.coords.speed ? (position.coords.speed * 3.6).toFixed(1) : 0,
                passenger_count: Math.floor(Math.random() * 30) // Penumpang dummy
            };

            client.publish(TOPIC, JSON.stringify(payload));
            log(`📤 Data terkirim: Lat ${payload.latitude.toFixed(4)}, Lon ${payload.longitude.toFixed(4)}`);
        }
    </script>
</body>
</html>
